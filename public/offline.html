<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#030303" />
  <title>TALIER Offline</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #1a1a1a 0%, #080808 45%, #030303 100%);
      color: #f8f8f8;
      font-family: Manrope, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .card {
      width: min(420px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    p {
      margin: 10px 0 0;
      color: rgba(248, 248, 248, 0.72);
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <article class="card">
    <h1>TALIER</h1>
    <p>You are offline right now. Reconnect and reload to sync the latest app updates.</p>
  </article>
</body>

</html>
